<!DOCTYPE html>
<html lang="en" style="background:#020617">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Redirecting...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#020617;color:#06b6d4;font-family:'Courier New',monospace;height:100%;overflow:hidden}
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px}
.spinner{width:40px;height:40px;border:3px solid rgba(6,182,212,0.2);border-top-color:#06b6d4;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.text{font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:0.7}
</style>
</head>
<body>
<div class="wrap">
<div class="spinner"></div>
<div class="text">Establishing secure connection...</div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var url = params.get('url');
if (url) {
  setTimeout(function(){ window.location.href = url; }, 150);
} else {
  document.querySelector('.text').textContent = 'ERROR: No redirect target';
}
</script>
</body>
</html>
